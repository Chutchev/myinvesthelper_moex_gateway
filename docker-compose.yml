version: "3.9"

services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - MOEX_BASE_URL=https://iss.moex.com/iss
      - CBR_KEY_RATE_URL=https://www.cbr.ru/eng/KeyRateValue/
      - CBR_FORECAST_PAGE_URL=https://www.cbr.ru/eng/Forecast/
      - HTTP_TIMEOUT=10s
      - MARKET_CACHE_TTL=15m
      - LOG_LEVEL=info
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
